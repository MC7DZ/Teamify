# =======================================================
#                Teamify Language File - Russian
# =======================================================
# This file only holds chat messages. All other settings
# (roles, limits, GUI, etc) stay in config.yml.
#
# Placeholders like {player}, {team}, {time} are replaced
# automatically where supported.
#
# IMPORTANT: Please translate the values below.

messages:
  no-permission: "<red>У вас нет разрешения на это."
  no-team: "<red>Вы не состоите в команде."
  already-in-team: "<red>Вы уже состоите в команде."
  team-created: "<green>Команда <aqua>{team} <green>успешно создана!"
  team-disbanded: "<red>Ваша команда расформирована."
  invite-sent: "<green>Приглашение отправлено <aqua>{player}<green>."
  invite-received: "<aqua>Вы были приглашены в команду <yellow>{team}<aqua>. Введите /team join {team}, чтобы принять."
  player-kicked: "<red>{player} <gray>был исключен из команды."
  not-enough-permission-role: "<red>Ваша роль не позволяет выполнить это действие."
  team-full: "<red>Эта команда заполнена."
  invalid-name: "<red>Неверное название команды. Проверьте длину и разрешенные символы."
  cooldown-active: "<red>Вы должны подождать {time}, прежде чем делать это снова."
  pvp-enabled: "<green>PVP команды теперь <bold>ВКЛЮЧЕН<green>."
  pvp-disabled: "<red>PVP команды теперь <bold>ВЫКЛЮЧЕН<red>."
  pvp-locked: "<red>Переключение PVP команды заблокировано, потому что friendly-fire.within-team включено в конфигурации."
  config-reloaded: "<green>Конфигурация перезагружена."

  # Kick
  cant-kick-yourself: "<red>Вы не можете исключить себя. Используйте /team leave или /team disband вместо этого."
  cant-kick-owner: "<red>Вы не можете исключить владельца команды."
  cant-kick-higher-rank: "<red>Вы не можете исключить кого-то, кто имеет равный или более высокий ранг, чем вы."
  player-not-in-team: "<red>Этот игрок не состоит в вашей команде."
  kicked-from-team: "<red>Вы были исключены из <white>{team}<red> игроком <white>{player}<red>."
  player-kicked-broadcast: "<gray>{player} был исключен из команды игроком <white>{kicker}<gray>."

  # Leave
  left-team: "<gray>Вы покинули <white>{team}<gray>."
  player-left-broadcast: "<gray>{player} покинул команду."

  # Join
  player-joined-broadcast: "<green>{player} присоединился к команде!"

  # Join requests (player -> team, no invite needed)
  team-not-found: "<red>Такой команды не существует."
  join-request-sent: "<green>Запрос на вступление отправлен в <aqua>{team}<green>."
  join-request-already-sent: "<red>У вас уже есть ожидающий запрос на вступление в <aqua>{team}<red>."
  join-request-received: "<yellow>{player} <gray>запросил(а) вступление в вашу команду."
  join-request-accepted: "<green>Ваш запрос на вступление в <aqua>{team} <green>принят!"
  join-request-denied: "<red>Ваш запрос на вступление в <aqua>{team} <red>отклонён."

  # Promote
  cant-promote-yourself: "<red>Вы не можете повысить себя."
  already-highest-rank: "<red>Этот игрок уже имеет наивысший ранг."
  cant-promote-own-rank: "<red>Вы не можете повысить кого-то до своего ранга или выше."
  promoted-to-leader: "<green>{player} теперь лидер команды. Вы теперь со-лидер."
  player-promoted: "<green>{player} повышен до {role}."
  promoted-notify: "<green>Вы были повышены до <aqua>{role}<green> в <white>{team}<green>!"
  promoted-broadcast: "<green>{player} был повышен до <aqua>{role}<green>."

  # Demote
  cant-demote-yourself: "<red>Вы не можете понизить себя."
  cant-demote-owner: "<red>Вы не можете понизить владельца команды."
  cant-demote-higher-rank: "<red>Вы не можете понизить кого-то, кто имеет равный или более высокий ранг, чем вы."
  player-demoted: "<green>{player} понижен до {role}."
  demoted-notify: "<red>Вы были понижены до <gray>{role}<red> в <white>{team}<red>."
  demoted-broadcast: "<gray>{player} был понижен до {role}."

  # Owner self rank change
  owner-role-changed: "<green>Ваш ранг установлен на {role}."

  # Ownership transfer
  ownership-transferred: "<green>{player} теперь владелец и лидер команды. Вы теперь {role}."
  ownership-transferred-notify: "<green>Вы теперь владелец <white>{team}<green>!"
  ownership-transferred-broadcast: "<yellow>{player} теперь владелец команды."

  # Disband
  team-disbanded-member: "<red>Ваша команда <white>{team} <red>была расформирована владельцем."

  # Disabled commands
  command-disabled: "<red>Эта команда отключена в конфигурации сервера."
  players-list-disabled: "<red>Список игроков отключен в конфигурации."

  # Home
  no-home-set: "<red>У вашей команды нет установленного дома."

  # Allies
  allies-disabled: "<red>Система альянсов отключена."
  ally-chat-disabled: "<red>Чат альянса отключен."
  ally-invalid-team: "<red>Такой команды не существует."
  ally-cant-self: "<red>Вы не можете заключать союз со своей командой."
  already-allied: "<red>Ваша команда уже в союзе с {team}."
  already-enemies: "<red>Вы не можете заключать союз с командой, с которой вы воюете."
  max-allies-reached: "<red>Ваша команда достигла максимального количества союзников."
  ally-invite-sent: "<green>Запрос на альянс отправлен <aqua>{team}<green>."
  ally-invite-received: "<aqua>{team} <gray>запросила альянс. Введите /team allyinvite {team}, чтобы принять."
  ally-added: "<green>Ваша команда теперь в союзе с <aqua>{team}<green>!"
  no-ally-invite: "<red>Эта команда не приглашала вас в альянс. Используйте /team allyinvite {team}, чтобы отправить запрос."
  not-allied: "<red>Ваша команда не в союзе с {team}."
  ally-removed: "<gray>Ваша команда больше не в союзе с <white>{team}<gray>."
  ally-chat-enabled: "<green>Чат альянса включен."
  ally-chat-disabled-toggle: "<gray>Чат альянса отключен."

  # Bank
  bank-disabled: "<red>Банк команды отключен."
  bank-no-economy: "<red>Не найден плагин экономики (Vault), поэтому банк команды не может перемещать реальные деньги в данный момент."
  bank-balance: "<gold>Баланс банка команды: <white>{amount}"
  bank-invalid-amount: "<red>Введите действительную положительную сумму."
  bank-insufficient-player-funds: "<red>У вас недостаточно денег."
  bank-insufficient-team-funds: "<red>В банке команды недостаточно денег."
  bank-max-balance: "<red>Банк команды уже достиг максимального баланса."
  bank-transaction-failed: "<red>Эта транзакция не удалась. Пожалуйста, попробуйте еще раз."
  bank-cant-withdraw-role: "<red>Ваша роль не позволяет снимать средства с банковского счета команды."
  bank-deposit-success: "<green>Внесено <white>{amount} <green>в банк команды. Новый баланс: <white>{balance}<green>."
  bank-withdraw-success: "<green>Снято <white>{amount} <green>из банка команды. Новый баланс: <white>{balance}<green>."
  bank-deposit-broadcast: "<gray>{player} внес <white>{amount} <gray>в банк команды."
  bank-withdraw-broadcast: "<gray>{player} снял <white>{amount} <gray>из банка команды."

  # Team customization (color & custom item)
  team-color-changed: "<green>Цвет команды установлен на {color}."
  team-color-disabled: "<red>Настройка цвета команды отключена."
  team-item-disabled: "<red>Настройка предмета команды отключена."
  team-item-apply-empty: "<red>Сначала поместите предмет в слот, затем нажмите применить."
  team-item-applied: "<green>Предмет вашей команды обновлен! Вы получили свой предмет обратно."
  team-item-cleared: "<gray>Предмет команды сброшен до значения по умолчанию."
  echest-disabled: "<red>Эндер-сундук команды отключен."
  echest-in-use: "<red>{player} <gray>сейчас использует эндер-сундук команды. Пожалуйста, подождите, пока он не закроет его."
  team-description-disabled: "<red>Описания команд отключены."
  team-description-prompt: "<green>Введите новое описание вашей команды в чате (или \"cancel\")."
  team-description-changed: "<green>Описание команды обновлено!"
  team-description-too-long: "<red>Это описание слишком длинное (максимум {max} символов)."
  team-description-cleared: "<gray>Описание команды очищено."
  team-tag-prompt: "<green>Введите новый тег вашей команды в чате (или \"cancel\")."
  invalid-tag-length: "<red>Неверная длина тега команды. Должна быть от {min} до {max} символов."
  team-tag-changed: "<green>Тег команды изменен на <white>{tag}<green>."

  # Invisibility visibility toggles