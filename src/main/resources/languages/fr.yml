# =======================================================
#                Teamify Language File - French
# =======================================================
# This file only holds chat messages. All other settings
# (roles, limits, GUI, etc) stay in config.yml.
#
# Placeholders like {player}, {team}, {time} are replaced
# automatically where supported.
#
# IMPORTANT: Please translate the values below.

messages:
  no-permission: "<red>Vous n'avez pas la permission de faire cela."
  no-team: "<red>Vous n'êtes pas dans une équipe."
  already-in-team: "<red>Vous êtes déjà dans une équipe."
  team-created: "<green>Équipe <aqua>{team} <green>créée avec succès !"
  team-disbanded: "<red>Votre équipe a été dissoute."
  invite-sent: "<green>Invitation envoyée à <aqua>{player}<green>."
  invite-received: "<aqua>Vous avez été invité à rejoindre <yellow>{team}<aqua>. Tapez /team join {team} pour accepter."
  player-kicked: "<red>{player} <gray>a été expulsé de l'équipe."
  not-enough-permission-role: "<red>Votre rôle ne permet pas cette action."
  team-full: "<red>Cette équipe est pleine."
  invalid-name: "<red>Nom d'équipe invalide. Vérifiez la longueur et les caractères autorisés."
  cooldown-active: "<red>Vous devez attendre {time} avant de refaire cela."
  pvp-enabled: "<green>Le PVP d'équipe est maintenant <bold>ACTIVÉ<green>."
  pvp-disabled: "<red>Le PVP d'équipe est maintenant <bold>DÉSACTIVÉ<red>."
  pvp-locked: "<red>Le basculement du PVP d'équipe est bloqué car friendly-fire.within-team est activé dans la configuration."
  config-reloaded: "<green>Configuration rechargée."

  # Kick
  cant-kick-yourself: "<red>Vous ne pouvez pas vous expulser vous-même. Utilisez /team leave ou /team disband à la place."
  cant-kick-owner: "<red>Vous ne pouvez pas expulser le propriétaire de l'équipe."
  cant-kick-higher-rank: "<red>Vous ne pouvez pas expulser quelqu'un qui a un rang égal ou supérieur au vôtre."
  player-not-in-team: "<red>Ce joueur n'est pas dans votre équipe."
  kicked-from-team: "<red>Vous avez été expulsé de <white>{team}<red> par <white>{player}<red>."
  player-kicked-broadcast: "<gray>{player} a été expulsé de l'équipe par <white>{kicker}<gray>."

  # Leave
  left-team: "<gray>Vous avez quitté <white>{team}<gray>."
  player-left-broadcast: "<gray>{player} a quitté l'équipe."

  # Join
  player-joined-broadcast: "<green>{player} a rejoint l'équipe !"

  # Join requests (player -> team, no invite needed)
  team-not-found: "<red>Cette équipe n'existe pas."
  join-request-sent: "<green>Demande d'adhésion envoyée à <aqua>{team}<green>."
  join-request-already-sent: "<red>Vous avez déjà une demande d'adhésion en attente pour <aqua>{team}<red>."
  join-request-received: "<yellow>{player} <gray>a demandé à rejoindre votre équipe."
  join-request-accepted: "<green>Votre demande pour rejoindre <aqua>{team} <green>a été acceptée !"
  join-request-denied: "<red>Votre demande pour rejoindre <aqua>{team} <red>a été refusée."

  # Promote
  cant-promote-yourself: "<red>Vous ne pouvez pas vous promouvoir vous-même."
  already-highest-rank: "<red>Ce joueur détient déjà le rang le plus élevé."
  cant-promote-own-rank: "<red>Vous ne pouvez pas promouvoir quelqu'un à votre rang ou plus."
  promoted-to-leader: "<green>{player} est maintenant le chef d'équipe. Vous êtes maintenant Co-Chef."
  player-promoted: "<green>{player} promu à {role}."
  promoted-notify: "<green>Vous avez été promu à <aqua>{role}<green> dans <white>{team}<green> !"
  promoted-broadcast: "<green>{player} a été promu à <aqua>{role}<green>."

  # Demote
  cant-demote-yourself: "<red>Vous ne pouvez pas vous rétrograder vous-même."
  cant-demote-owner: "<red>Vous ne pouvez pas rétrograder le propriétaire de l'équipe."
  cant-demote-higher-rank: "<red>Vous ne pouvez pas rétrograder quelqu'un qui a un rang égal ou supérieur au vôtre."
  player-demoted: "<green>{player} rétrogradé à {role}."
  demoted-notify: "<red>Vous avez été rétrogradé à <gray>{role}<red> dans <white>{team}<red>."
  demoted-broadcast: "<gray>{player} a été rétrogradé à {role}."

  # Owner self rank change
  owner-role-changed: "<red>Votre rang a été défini sur {role}."

  # Ownership transfer
  ownership-transferred: "<green>{player} est maintenant le propriétaire et chef d'équipe. Vous êtes maintenant {role}."
  ownership-transferred-notify: "<green>Vous êtes maintenant le propriétaire de <white>{team}<green> !"
  ownership-transferred-broadcast: "<yellow>{player} est maintenant le propriétaire de l'équipe."

  # Disband
  team-disbanded-member: "<red>Votre équipe <white>{team} <red>a été dissoute par le propriétaire."

  # Disabled commands
  command-disabled: "<red>Cette commande est désactivée par la configuration du serveur."
  players-list-disabled: "<red>La liste des joueurs est désactivée dans la configuration."

  # Home
  no-home-set: "<red>Votre équipe n'a pas de foyer défini."

  # Allies
  allies-disabled: "<red>Le système d'alliances est désactivé."
  ally-chat-disabled: "<red>Le chat allié est désactivé."
  ally-invalid-team: "<red>Cette équipe n'existe pas."
  ally-cant-self: "<red>Vous ne pouvez pas vous allier avec votre propre équipe."
  already-allied: "<red>Votre équipe est déjà alliée avec {team}."
  already-enemies: "<red>Vous ne pouvez pas vous allier avec une équipe avec laquelle vous êtes en guerre."
  max-allies-reached: "<red>Votre équipe a atteint le nombre maximum d'alliés."
  ally-invite-sent: "<green>Demande d'alliance envoyée à <aqua>{team}<green>."
  ally-invite-received: "<aqua>{team} <gray>a demandé une alliance. Tapez /team allyinvite {team} pour accepter."
  ally-added: "<green>Votre équipe est maintenant alliée avec <aqua>{team}<green> !"
  no-ally-invite: "<red>Cette équipe ne vous a pas invité à une alliance. Utilisez /team allyinvite {team} pour en envoyer une."
  not-allied: "<red>Votre équipe n'est pas alliée avec {team}."
  ally-removed: "<gray>Votre équipe n'est plus alliée avec <white>{team}<gray>."
  ally-chat-enabled: "<green>Chat allié activé."
  ally-chat-disabled-toggle: "<gray>Chat allié désactivé."

  # Bank
  bank-disabled: "<red>La banque d'équipe est désactivée."
  bank-no-economy: "<red>Aucun plugin d'économie (Vault) n'a été trouvé, donc la banque d'équipe ne peut pas déplacer d'argent réel pour le moment."
  bank-balance: "<gold>Solde de la Banque d'équipe : <white>{amount}"
  bank-invalid-amount: "<red>Entrez un montant positif valide."
  bank-insufficient-player-funds: "<red>Vous n'avez pas autant d'argent."
  bank-insufficient-team-funds: "<red>La banque d'équipe n'a pas autant d'argent."
  bank-max-balance: "<red>La banque d'équipe a déjà atteint son solde maximum."
  bank-transaction-failed: "<red>Cette transaction a échoué. Veuillez réessayer."
  bank-cant-withdraw-role: "<red>Votre rôle n'est pas autorisé à retirer de la banque d'équipe."
  bank-deposit-success: "<green>Déposé <white>{amount} <green>dans la banque d'équipe. Nouveau solde : <white>{balance}<green>."
  bank-withdraw-success: "<green>Retiré <white>{amount} <green>de la banque d'équipe. Nouveau solde : <white>{balance}<green>."
  bank-deposit-broadcast: "<gray>{player} a déposé <white>{amount} <gray>dans la banque d'équipe."
  bank-withdraw-broadcast: "<gray>{player} a retiré <white>{amount} <gray>de la banque d'équipe."

  # Team customization (color & custom item)
  team-color-changed: "<green>Couleur de l'équipe définie sur {color}."
  team-color-disabled: "<red>La personnalisation de la couleur de l'équipe est désactivée."
  team-item-disabled: "<red>La personnalisation de l'objet d'équipe est désactivée."
  team-item-apply-empty: "<red>Placez d'abord un objet dans l'emplacement, puis cliquez sur appliquer."
  team-item-applied: "<green>L'objet de votre équipe a été mis à jour ! Vous avez récupéré votre objet."
  team-item-cleared: "<gray>Objet d'équipe réinitialisé par défaut."
  echest-disabled: "<red>Le coffre de l'end de l'équipe est désactivé."
  echest-in-use: "<red>{player} <gray>utilise actuellement le coffre de l'end de l'équipe. Veuillez attendre qu'il/elle le ferme."
  team-description-disabled: "<red>Les descriptions d'équipe sont désactivées."
  team-description-prompt: "<green>Tapez la nouvelle description de votre équipe dans le chat (ou \"annuler\")."
  team-description-changed: "<green>Description de l'équipe mise à jour !"
  team-description-too-long: "<red>Cette description est trop longue (max {max} caractères)."
  team-description-cleared: "<gray>Description de l'équipe effacée."
  team-tag-prompt: "<green>Tapez le nouveau tag de votre équipe dans le chat (ou \"annuler\")."
  invalid-tag-length: "<red>Longueur de tag d'équipe invalide. Doit être entre {min} et {max} caractères."
  team-tag-changed: "<green>Tag de l'équipe changé en <white>{tag}<green>."

  # Invisibility visibility toggles