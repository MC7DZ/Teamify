  left-team: "&7You left &f{team}&7."
  player-left-broadcast: "&7{player} has left the team."

  # Join
  player-joined-broadcast: "&a{player} has joined the team!"

  # Join requests (player -> team, no invite needed)
  team-not-found: "&cThat team doesn't exist."
  join-request-sent: "&aJoin request sent to &b{team}&a."
  join-request-already-sent: "&cYou already have a pending join request to &b{team}&c."
  join-request-received: "&e{player} &7has requested to join your team."
  join-request-accepted: "&aYour request to join &b{team} &awas accepted!"
