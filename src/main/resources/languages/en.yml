# =======================================================
#                Teamify Language File - English
# =======================================================
# This file only holds chat messages. All other settings
# (roles, limits, GUI, etc) stay in config.yml.
#
# Placeholders like {player}, {team}, {time} are replaced
# automatically where supported.

messages:
  no-permission: "&cYou don't have permission to do that."
  no-team: "&cYou are not in a team."
  already-in-team: "&cYou are already in a team."
  team-created: "&aTeam &b{team} &acreated successfully!"
  team-disbanded: "&cYour team has been disbanded."
  invite-sent: "&aInvite sent to &b{player}&a."
  invite-received: "&bYou have been invited to join &e{team}&b. Type /team join {team} to accept."
  player-kicked: "&c{player} &7has been kicked from the team."
  not-enough-permission-role: "&cYour role does not allow this action."
  team-full: "&cThat team is full."
  invalid-name: "&cInvalid team name. Check length and allowed characters."
  cooldown-active: "&cYou must wait {time} before doing that again."
  pvp-enabled: "&aTeam PVP is now &lON&a."
  pvp-disabled: "&cTeam PVP is now &lOFF&c."
  pvp-locked: "&cTeam PVP toggle is locked because friendly-fire.within-team is enabled in the config."
  config-reloaded: "&aConfiguration reloaded."

  # Kick
  cant-kick-yourself: "&cYou can't kick yourself. Use /team leave or /team disband instead."
  cant-kick-owner: "&cYou can't kick the team owner."
  cant-kick-higher-rank: "&cYou can't kick someone who is the same rank or higher than you."
