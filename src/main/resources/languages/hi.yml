  cant-demote-owner: "<red>आप टीम के मालिक को डिमोट नहीं कर सकते।"
  cant-demote-higher-rank: "<red>आप अपने समान या उच्च रैंक वाले किसी व्यक्ति को डिमोट नहीं कर सकते।"
  player-demoted: "<green>{player} को {role} के रूप में डिमोट किया गया है।"
  demoted-notify: "<red>आपको <white>{team}<red> में <gray>{role}<red> के रूप में डिमोट किया गया है।"
  demoted-broadcast: "<gray>{player} को {role} के रूप में डिमोट किया गया है।"

  # Owner self rank change (मालिक का खुद का रैंक बदलना)
  owner-role-changed: "<green>आपका रैंक {role} पर सेट कर दिया गया है।"

  # Ownership transfer (स्वामित्व स्थानांतरण)
  ownership-transferred: "<green>{player} अब टीम के मालिक और लीडर हैं। आप अब {role} हैं।"
