# =======================================================
#               Teamify भाषा फ़ाइल - हिंदी
# =======================================================
# इस फ़ाइल में केवल चैट संदेश हैं। अन्य सभी सेटिंग्स
# (roles, limits, GUI, आदि) config.yml में रहती हैं।
#
# {player}, {team}, {time} जैसे प्लेसहोल्डर जहाँ समर्थित हैं, 
# वहाँ स्वचालित रूप से बदल दिए जाते हैं।
#
# महत्वपूर्ण: कृपया नीचे दिए गए मानों का अनुवाद करें।

messages:
  no-permission: "<red>आपके पास ऐसा करने की अनुमति नहीं है।"
  no-team: "<red>आप किसी टीम में नहीं हैं।"
  already-in-team: "<red>आप पहले से ही एक टीम में हैं।"
  team-created: "<green>टीम <aqua>{team} <green>सफलतापूर्वक बनाई गई!"
  team-disbanded: "<red>आपकी टीम भंग (disband) कर दी गई है।"
  invite-sent: "<green>निमंत्रण <aqua>{player}<green> को भेजा गया।"
  invite-received: "<aqua>आपको <yellow>{team}<aqua> में शामिल होने का निमंत्रण मिला है। स्वीकार करने के लिए /team join {team} टाइप करें।"
  player-kicked: "<red>{player} <gray>को टीम से निकाल दिया गया है।"
  not-enough-permission-role: "<red>इस क्रिया को करने के लिए आपके पास पर्याप्त अनुमतियाँ नहीं हैं।"
  team-full: "<red>यह टीम भर चुकी है।"
  invalid-name: "<red>टीम का नाम अमान्य है। कृपया लंबाई और स्वीकृत वर्णों की जाँच करें।"
  cooldown-active: "<red>इस क्रिया को दोबारा करने के लिए आपको {time} तक प्रतीक्षा करनी होगी।"
  pvp-enabled: "<green>टीम PVP अब <bold>सक्षम<green> है।"
  pvp-disabled: "<red>टीम PVP अब <bold>अक्षम<red> है।"
  pvp-locked: "<red>टीम PVP टॉगल लॉक है क्योंकि कॉन्फ़िगरेशन में friendly-fire.within-team सक्षम है।"
  config-reloaded: "<green>कॉन्फ़िगरेशन पुनः लोड कर दिया गया है।"

  # Kick (निकालना)
  cant-kick-yourself: "<red>आप खुद को नहीं निकाल सकते। इसके बजाय /team leave या /team disband का उपयोग करें।"
  cant-kick-owner: "<red>आप टीम के मालिक को नहीं निकाल सकते।"
  cant-kick-higher-rank: "<red>आप अपने समान या उच्च रैंक वाले किसी व्यक्ति को नहीं निकाल सकते।"
  player-not-in-team: "<red>यह खिलाड़ी आपकी टीम में नहीं है।"
  kicked-from-team: "<red>आपको <white>{player}<red> द्वारा <white>{team}<red> से निकाल दिया गया है।"
  player-kicked-broadcast: "<gray>{player} को <white>{kicker}<gray> द्वारा टीम से निकाल दिया गया है।"

  # Leave (छोड़ना)
  left-team: "<gray>आपने <white>{team}<gray> को छोड़ दिया है।"
  player-left-broadcast: "<gray>{player} ने टीम छोड़ दी है।"

  # Join (शामिल होना)
  player-joined-broadcast: "<green>{player} टीम में शामिल हो गए हैं!"

