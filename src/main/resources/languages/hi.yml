  # Disband (भंग करना)
  team-disbanded-member: "<red>आपकी टीम <white>{team} <red>मालिक द्वारा भंग कर दी गई है।"

  # Disabled commands (अक्षम कमांड)
  command-disabled: "<red>यह कमांड सर्वर कॉन्फ़िगरेशन द्वारा अक्षम कर दी गई है।"
