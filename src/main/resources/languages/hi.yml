  join-request-received: "<yellow>{player} <gray>ने आपकी टीम में शामिल होने का अनुरोध किया है।"
  join-request-accepted: "<green><aqua>{team} <green>में शामिल होने का आपका अनुरोध स्वीकार कर लिया गया!"
  join-request-denied: "<red><aqua>{team} <red>में शामिल होने का आपका अनुरोध अस्वीकार कर दिया गया।"

  # Promote (पदोन्नति)
  cant-promote-yourself: "<red>आप खुद को प्रमोट नहीं कर सकते।"
  already-highest-rank: "<red>इस खिलाड़ी के पास पहले से ही उच्चतम रैंक है।"
  cant-promote-own-rank: "<red>आप किसी को अपने समान या उच्च रैंक पर प्रमोट नहीं कर सकते।"
