# =======================================================
#                Teamify Language File - Spanish
# =======================================================
# This file only holds chat messages. All other settings
# (roles, limits, GUI, etc) stay in config.yml.
#
# Placeholders like {player}, {team}, {time} are replaced
# automatically where supported.
#
# IMPORTANT: Please translate the values below.

messages:
  no-permission: "<red>No tienes permiso para hacer eso."
  no-team: "<red>No estás en un equipo."
  already-in-team: "<red>Ya estás en un equipo."
  team-created: "<green>¡Equipo <aqua>{team} <green>creado con éxito!"
  team-disbanded: "<red>Tu equipo ha sido disuelto."
  invite-sent: "<green>Invitación enviada a <aqua>{player}<green>."
  invite-received: "<aqua>Has sido invitado a unirte a <yellow>{team}<aqua>. Escribe /team join {team} para aceptar."
  player-kicked: "<red>{player} <gray>ha sido expulsado del equipo."
  not-enough-permission-role: "<red>Tu rol no permite esta acción."
  team-full: "<red>Ese equipo está lleno."
  invalid-name: "<red>Nombre de equipo inválido. Verifica la longitud y los caracteres permitidos."
  cooldown-active: "<red>Debes esperar {time} antes de hacer eso de nuevo."
  pvp-enabled: "<green>El PVP del equipo está ahora <bold>ACTIVADO<green>."
  pvp-disabled: "<red>El PVP del equipo está ahora <bold>DESACTIVADO<red>."
  pvp-locked: "<red>El cambio de PVP del equipo está bloqueado porque friendly-fire.within-team está habilitado en la configuración."
  config-reloaded: "<green>Configuración recargada."

  # Kick
  cant-kick-yourself: "<red>No puedes expulsarte a ti mismo. Usa /team leave o /team disband en su lugar."
  cant-kick-owner: "<red>No puedes expulsar al propietario del equipo."
  cant-kick-higher-rank: "<red>No puedes expulsar a alguien que tenga un rango igual o superior al tuyo."
  player-not-in-team: "<red>Ese jugador no está en tu equipo."
  kicked-from-team: "<red>Has sido expulsado de <white>{team}<red> por <white>{player}<red>."
  player-kicked-broadcast: "<gray>{player} fue expulsado del equipo por <white>{kicker}<gray>."

  # Leave
  left-team: "<gray>Has dejado <white>{team}<gray>."
  player-left-broadcast: "<gray>{player} ha dejado el equipo."

  # Join
  player-joined-broadcast: "<green>¡{player} se ha unido al equipo!"

  # Join requests (player -> team, no invite needed)
  team-not-found: "<red>Ese equipo no existe."
  join-request-sent: "<green>Solicitud de unión enviada a <aqua>{team}<green>."
  join-request-already-sent: "<red>Ya tienes una solicitud de unión pendiente a <aqua>{team}<red>."
  join-request-received: "<yellow>{player} <gray>ha solicitado unirse a tu equipo."
  join-request-accepted: "<green>¡Tu solicitud para unirte a <aqua>{team} <green>fue aceptada!"
  join-request-denied: "<red>Tu solicitud para unirte a <aqua>{team} <red>fue rechazada."

  # Promote
  cant-promote-yourself: "<red>No puedes promocionarte a ti mismo."
  already-highest-rank: "<red>Ese jugador ya tiene el rango más alto."
  cant-promote-own-rank: "<red>No puedes promocionar a alguien a tu rango o superior."
  promoted-to-leader: "<green>{player} es ahora el líder del equipo. Ahora eres Co-Líder."
  player-promoted: "<green>{player} promocionado a {role}."
  promoted-notify: "<green>¡Fuiste promocionado a <aqua>{role}<green> en <white>{team}<green>!"
  promoted-broadcast: "<green>{player} fue promocionado a <aqua>{role}<green>."

  # Demote
  cant-demote-yourself: "<red>No puedes degradarte a ti mismo."
  cant-demote-owner: "<red>No puedes degradar al propietario del equipo."
  cant-demote-higher-rank: "<red>No puedes degradar a alguien que tenga un rango igual o superior al tuyo."
  player-demoted: "<green>{player} degradado a {role}."
  demoted-notify: "<red>Fuiste degradado a <gray>{role}<red> en <white>{team}<red>."
  demoted-broadcast: "<gray>{player} fue degradado a {role}."

  # Owner self rank change
  owner-role-changed: "<green>Tu rango ha sido establecido a {role}."

  # Ownership transfer
  ownership-transferred: "<green>{player} es ahora el propietario y Líder del equipo. Ahora eres {role}."
  ownership-transferred-notify: "<green>¡Ahora eres el propietario de <white>{team}<green>!"
  ownership-transferred-broadcast: "<yellow>{player} es ahora el propietario del equipo."

  # Disband
  team-disbanded-member: "<red>Tu equipo <white>{team} <red>ha sido disuelto por el propietario."

  # Disabled commands
  command-disabled: "<red>Este comando está deshabilitado por la configuración del servidor."
  players-list-disabled: "<red>La lista de jugadores está deshabilitada en la configuración."

  # Home
  no-home-set: "<red>Tu equipo no tiene un hogar establecido."

  # Allies
  allies-disabled: "<red>El sistema de alianzas está deshabilitado."
  ally-chat-disabled: "<red>El chat de aliados está deshabilitado."
  ally-invalid-team: "<red>Ese equipo no existe."
  ally-cant-self: "<red>No puedes aliarte con tu propio equipo."
  already-allied: "<red>Tu equipo ya está aliado con {team}."
  already-enemies: "<red>No puedes aliarte con un equipo con el que estás en guerra."
  max-allies-reached: "<red>Tu equipo ha alcanzado el número máximo de aliados."
  ally-invite-sent: "<green>Solicitud de alianza enviada a <aqua>{team}<green>."
  ally-invite-received: "<aqua>{team} <gray>ha solicitado una alianza. Escribe /team allyinvite {team} para aceptar."
  ally-added: "<green>¡Tu equipo ahora está aliado con <aqua>{team}<green>!"
  no-ally-invite: "<red>Ese equipo no te ha invitado a una alianza. Usa /team allyinvite {team} para enviar una."
  not-allied: "<red>Tu equipo no está aliado con {team}."
  ally-removed: "<gray>Tu equipo ya no está aliado con <white>{team}<gray>."
  ally-chat-enabled: "<green>Chat de aliados habilitado."
  ally-chat-disabled-toggle: "<gray>Chat de aliados deshabilitado."

  # Bank
  bank-disabled: "<red>El banco del equipo está deshabilitado."
  bank-no-economy: "<red>No se encontró ningún plugin de economía (Vault), por lo que el banco del equipo no puede mover dinero real en este momento."
  bank-balance: "<gold>Saldo del Banco del Equipo: <white>{amount}"
  bank-invalid-amount: "<red>Ingresa una cantidad positiva válida."
  bank-insufficient-player-funds: "<red>No tienes tanto dinero."
  bank-insufficient-team-funds: "<red>El banco del equipo no tiene tanto dinero."
  bank-max-balance: "<red>El banco del equipo ya está en su saldo máximo."
  bank-transaction-failed: "<red>Esa transacción falló. Por favor, inténtalo de nuevo."
  bank-cant-withdraw-role: "<red>Tu rol no tiene permitido retirar del banco del equipo."
  bank-deposit-success: "<green>Depositado <white>{amount} <green>en el banco del equipo. Nuevo saldo: <white>{balance}<green>."
  bank-withdraw-success: "<green>Retirado <white>{amount} <green>del banco del equipo. Nuevo saldo: <white>{balance}<green>."
  bank-deposit-broadcast: "<gray>{player} depositó <white>{amount} <gray>en el banco del equipo."
  bank-withdraw-broadcast: "<gray>{player} retiró <white>{amount} <gray>del banco del equipo."

  # Team customization (color & custom item)
  team-color-changed: "<green>Color del equipo establecido a {color}."
  team-color-disabled: "<red>La personalización del color del equipo está deshabilitada."
  team-item-disabled: "<red>La personalización del artículo del equipo está deshabilitada."
  team-item-apply-empty: "<red>Primero coloca un artículo en la ranura, luego haz clic en aplicar."
  team-item-applied: "<green>¡El artículo de tu equipo ha sido actualizado! Recuperaste tu artículo."
  team-item-cleared: "<gray>Artículo del equipo restablecido a predeterminado."
  echest-disabled: "<red>El baúl de ender del equipo está deshabilitado."
  echest-in-use: "<red>{player} <gray>está usando actualmente el baúl de ender del equipo. Por favor espera hasta que lo cierre."
  team-description-disabled: "<red>Las descripciones de equipo están deshabilitadas."
  team-description-prompt: "<green>Escribe la nueva descripción de tu equipo en el chat (o \"cancelar\")."
  team-description-changed: "<green>¡Descripción del equipo actualizada!"
  team-description-too-long: "<red>Esa descripción es demasiado larga (máximo {max} caracteres)."
  team-description-cleared: "<gray>Descripción del equipo borrada."
  team-tag-prompt: "<green>Escribe la nueva etiqueta de tu equipo en el chat (o \"cancelar\")."
  invalid-tag-length: "<red>Longitud de etiqueta de equipo inválida. Debe estar entre {min} y {max} caracteres."
  team-tag-changed: "<green>Etiqueta del equipo cambiada a <white>{tag}<green>."

  # Invisibility visibility toggles