# =======================================================
#                Teamify Language File - Chinese
# =======================================================
# This file only holds chat messages. All other settings
# (roles, limits, GUI, etc) stay in config.yml.
#
# Placeholders like {player}, {team}, {time} are replaced
# automatically where supported.
#
# IMPORTANT: Please translate the values below.

messages:
  no-permission: "<red>你没有权限这样做。"
  no-team: "<red>你不在一个队伍中。"
  already-in-team: "<red>你已经在一个队伍中。"
  team-created: "<green>队伍 <aqua>{team} <green>创建成功！"
  team-disbanded: "<red>你的队伍已被解散。"
  invite-sent: "<green>邀请已发送给 <aqua>{player}<green>。"
  invite-received: "<aqua>你已收到加入 <yellow>{team}<aqua> 的邀请。输入 /team join {team} 接受。"
  player-kicked: "<red>{player} <gray>已被踢出队伍。"
  not-enough-permission-role: "<red>你的角色没有足够的权限执行此操作。"
  team-full: "<red>该队伍已满。"
  invalid-name: "<red>队伍名称无效。请检查长度和允许的字符。"
  cooldown-active: "<red>你必须等待 {time} 才能再次执行此操作。"
  pvp-enabled: "<green>队伍PVP现在 <bold>已启用<green>。"
  pvp-disabled: "<red>队伍PVP现在 <bold>已禁用<red>。"
  pvp-locked: "<red>队伍PVP切换被锁定，因为配置中启用了friendly-fire.within-team。"
  config-reloaded: "<green>配置已重新加载。"

  # Kick
  cant-kick-yourself: "<red>你不能踢出自己。请使用 /team leave 或 /team disband 代替。"
  cant-kick-owner: "<red>你不能踢出队伍所有者。"
  cant-kick-higher-rank: "<red>你不能踢出与你等级相同或更高的人。"
  player-not-in-team: "<red>该玩家不在你的队伍中。"
  kicked-from-team: "<red>你已被 <white>{player}<red> 从 <white>{team}<red> 踢出。"
  player-kicked-broadcast: "<gray>{player} 被 <white>{kicker}<gray> 踢出队伍。"

  # Leave
  left-team: "<gray>你离开了 <white>{team}<gray>。"
  player-left-broadcast: "<gray>{player} 离开了队伍。"

  # Join
  player-joined-broadcast: "<green>{player} 已加入队伍！"

  # Join requests (player -> team, no invite needed)
  team-not-found: "<red>该队伍不存在。"
  join-request-sent: "<green>加入请求已发送给 <aqua>{team}<green>。"
  join-request-already-sent: "<red>你已有一个待处理的加入请求发送给 <aqua>{team}<red>。"
  join-request-received: "<yellow>{player} <gray>请求加入你的队伍。"
  join-request-accepted: "<green>你加入 <aqua>{team} <green>的请求已被接受！"
  join-request-denied: "<red>你加入 <aqua>{team} <red>的请求被拒绝。"

  # Promote
  cant-promote-yourself: "<red>你不能晋升自己。"
  already-highest-rank: "<red>该玩家已拥有最高等级。"
  cant-promote-own-rank: "<red>你不能将某人晋升到与你相同或更高的等级。"
  promoted-to-leader: "<green>{player} 现在是队伍领袖。你现在是副领袖。"
  player-promoted: "<green>{player} 已晋升为 {role}。"
  promoted-notify: "<green>你已在 <white>{team}<green> 中晋升为 <aqua>{role}<green>！"
  promoted-broadcast: "<green>{player} 已晋升为 <aqua>{role}<green>。"

  # Demote
  cant-demote-yourself: "<red>你不能降级自己。"
  cant-demote-owner: "<red>你不能降级队伍所有者。"
  cant-demote-higher-rank: "<red>你不能降级与你等级相同或更高的人。"
  player-demoted: "<green>{player} 已降级为 {role}。"
  demoted-notify: "<red>你已在 <white>{team}<red> 中降级为 <gray>{role}<red>。"
  demoted-broadcast: "<gray>{player} 已降级为 {role}。"

  # Owner self rank change
  owner-role-changed: "<green>你的等级已设置为 {role}。"

  # Ownership transfer
  ownership-transferred: "<green>{player} 现在是队伍所有者和领袖。你现在是 {role}。"
  ownership-transferred-notify: "<green>你现在是 <white>{team}<green> 的所有者！"
  ownership-transferred-broadcast: "<yellow>{player} 现在是队伍所有者。"

  # Disband
  team-disbanded-member: "<red>你的队伍 <white>{team} <red>已被所有者解散。"

  # Disabled commands
  command-disabled: "<red>此命令已被服务器配置禁用。"
  players-list-disabled: "<red>玩家列表在配置中已被禁用。"

  # Home
  no-home-set: "<red>你的队伍没有设置家。"

  # Allies
  allies-disabled: "<red>联盟系统已禁用。"
  ally-chat-disabled: "<red>盟友聊天已禁用。"
  ally-invalid-team: "<red>该队伍不存在。"
  ally-cant-self: "<red>你不能与自己的队伍结盟。"
  already-allied: "<red>你的队伍已与 {team} 结盟。"
  already-enemies: "<red>你不能与你正在交战的队伍结盟。"
  max-allies-reached: "<red>你的队伍已达到最大盟友数量。"
  ally-invite-sent: "<green>联盟请求已发送给 <aqua>{team}<green>。"
  ally-invite-received: "<aqua>{team} <gray>已请求结盟。输入 /team allyinvite {team} 接受。"
  ally-added: "<green>你的队伍现在已与 <aqua>{team}<green> 结盟！"
  no-ally-invite: "<red>该队伍没有邀请你结盟。使用 /team allyinvite {team} 发送请求。"
  not-allied: "<red>你的队伍未与 {team} 结盟。"
  ally-removed: "<gray>你的队伍不再与 <white>{team}<gray> 结盟。"
  ally-chat-enabled: "<green>盟友聊天已启用。"
  ally-chat-disabled-toggle: "<gray>盟友聊天已禁用。"

  # Bank
  bank-disabled: "<red>队伍银行已禁用。"
  bank-no-economy: "<red>未找到经济插件 (Vault)，因此队伍银行目前无法转移真实货币。"
  bank-balance: "<gold>队伍银行余额: <white>{amount}"
  bank-invalid-amount: "<red>请输入有效的正数金额。"
  bank-insufficient-player-funds: "<red>你没有那么多钱。"
  bank-insufficient-team-funds: "<red>队伍银行没有那么多钱。"
  bank-max-balance: "<red>队伍银行已达到最大余额。"
  bank-transaction-failed: "<red>交易失败。请重试。"
  bank-cant-withdraw-role: "<red>你的角色不允许从队伍银行提款。"
  bank-deposit-success: "<green>已存入 <white>{amount} <green>到队伍银行。新余额: <white>{balance}<green>。"
  bank-withdraw-success: "<green>已从队伍银行取出 <white>{amount} <green>。新余额: <white>{balance}<green>。"
  bank-deposit-broadcast: "<gray>{player} 存入了 <white>{amount} <gray>到队伍银行。"
  bank-withdraw-broadcast: "<gray>{player} 从队伍银行取出了 <white>{amount} <gray>。"

  # Team customization (color & custom item)
  team-color-changed: "<green>队伍颜色已设置为 {color}。"
  team-color-disabled: "<red>队伍颜色自定义已禁用。"
  team-item-disabled: "<red>队伍物品自定义已禁用。"
  team-item-apply-empty: "<red>请先将物品放入槽位，然后点击应用。"
  team-item-applied: "<green>你的队伍物品已更新！你已取回你的物品。"
  team-item-cleared: "<gray>队伍物品已重置为默认值。"
  echest-disabled: "<red>队伍末影箱已被禁用。"
  echest-in-use: "<red>{player} <gray>正在使用队伍末影箱，请等待其关闭后再试。"
  team-description-disabled: "<red>队伍描述已禁用。"
  team-description-prompt: "<green>在聊天中输入你的队伍新描述（或“取消”）。"
  team-description-changed: "<green>队伍描述已更新！"
  team-description-too-long: "<red>该描述过长（最多 {max} 个字符）。"
  team-description-cleared: "<gray>队伍描述已清除。"
  team-tag-prompt: "<green>在聊天中输入你的队伍新标签（或“取消”）。"
  invalid-tag-length: "<red>队伍标签长度无效。必须在 {min} 到 {max} 个字符之间。"
  team-tag-changed: "<green>队伍标签已更改为 <white>{tag}<green>。"

  # Invisibility visibility toggles